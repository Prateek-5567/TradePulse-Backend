spring.application.name=trading

server.port=${PORT:5000}

# AWS hosting configuration (dual mode: localhost + environment variable mode)
spring.datasource.url=jdbc:mysql://${RDS_HOSTNAME:localhost}:${RDS_PORT:3307}/${RDS_DB_NAME:your-database-name}
spring.datasource.username=${RDS_USERNAME:your-db-username}
spring.datasource.password=${RDS_PASSWORD:your-db-password}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update


# Docker connection : (use host port in URL followed by database name)
# spring.datasource.url=jdbc:mysql://localhost:3307/your-database-name
# spring.datasource.username=your-db-username
# spring.datasource.password=your-db-password
## this username and password is application side (docker container credentials)

# spring.jpa.hibernate.ddl-auto=update
## ddl-auto=update is very important
## any entity/schema changes in code automatically reflect in DB

# spring.jpa.show-sql=true
# spring.jpa.open-in-view=false

# image is created and this is the id : <your-docker-image-id>

# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
## can be ignored if only one DB driver dependency is present

# Spring Security default credentials
spring.security.user.name=your-security-username
spring.security.user.password=your-security-password

#######################################
# EMAIL CONFIGURATION (GMAIL SMTP)
#######################################
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password   # NEVER expose this publicly

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

#######################################
# STRIPE PAYMENT GATEWAY CONFIGURATION
#######################################
stripe.api.key=your-stripe-secret-key
# Example format: sk_test_xxxxxxxxxxxxxxxxx

#######################################
# RAZORPAY PAYMENT GATEWAY
#######################################
razorpay.api.key=your-razorpay-key-id
razorpay.api.secret=your-razorpay-secret-key
# even one extra space in API key can cause 500 unauthorized error

#######################################
# COINGECKO API
#######################################
coingecko.api.key=your-coingecko-api-key

#######################################
# GEMINI API
#######################################
gemini.api.key=your-gemini-api-key

#######################################
# GOOGLE OAUTH2
#######################################
# free projects can be created using college/work account

spring.security.oauth2.client.registration.google.client-id=your-google-client-id
spring.security.oauth2.client.registration.google.client-secret=your-google-client-secret

# Google Cloud Console
# https://console.cloud.google.com/
# Configure from:
# APIs & Services -> Credentials -> OAuth Web Client